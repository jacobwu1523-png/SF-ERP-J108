<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>J108 ERP ｜ 雙向驗證版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap');
        :root { --ink: #3e2723; --paper: #fdfaf5; --danger: #e74c3c; --success: #2ecc71; --gold: #d4af37; }
        
        body { font-family: "KaiTi", "標楷體", serif; background: var(--paper); color: var(--ink); margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; box-sizing: border-box; }

        #role-select { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 25px; }
        .role-btn { width: 80%; max-width: 300px; padding: 20px; font-size: 1.4rem; cursor: pointer; border: 4px double var(--ink); background: white; font-family: inherit; }

        nav { background: var(--ink); padding: 10px; display: none; justify-content: center; gap: 8px; flex-wrap: wrap; z-index: 100; }
        nav button { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.9rem; }

        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; }
        .btn-main { background: var(--ink); color: white; padding: 15px; border: none; cursor: pointer; font-family: inherit; border-radius: 8px; width: 100%; font-size: 1.1rem; font-weight: bold; }

        .product-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .b-check { width: 30px; height: 30px; margin-right: 12px; }

        .custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-box { background: var(--paper); padding: 25px; border: 6px double var(--ink); width: 85%; max-width: 360px; text-align: center; }

        .ticket { border: 2px dashed #888; padding: 15px; background: white; margin-top: 10px; }
        .random-code { font-size: 2rem; font-weight: bold; color: var(--danger); letter-spacing: 2px; margin: 10px 0; }
    </style>
</head>
<body>

<div id="role-select">
    <h1 style="font-size: 2.8rem; margin: 0;">J108 ERP</h1>
    <button class="role-btn" onclick="window.enterApp('buyer')">🛍️ 買家進入</button>
    <button class="role-btn" onclick="window.openAdminLogin()">⚙️ 管理登入</button>
</div>

<nav id="admin-nav">
    <button onclick="window.showSection('admin-orders')">📋 訂單管理</button>
    <button onclick="window.showSection('admin-products')">⚙️ 商品參數</button>
    <button onclick="window.showSection('admin-users')">👤 帳號設定</button>
    <button onclick="location.reload()" style="background:#b71c1c;">🚪 登出</button>
</nav>

<div class="scroll-area" id="app-container" style="display:none;">
    <div id="buyer-page" class="section">
        <h2>🖋️ 填寫訂單</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <select id="b-grade">
                <option value="" disabled selected>年級</option>
                <option value="國一">國一</option><option value="國二">國二</option><option value="國三">國三</option>
                <option value="高一">高一</option><option value="高二">高二</option><option value="高三">高三</option>
            </select>
            <select id="b-class"><option value="" disabled selected>班級</option></select>
            <select id="b-no" style="grid-column: span 2;"><option value="" disabled selected>座號</option></select>
        </div>
        <input type="text" id="b-name" placeholder="您的真實姓名">
        <div id="buyer-item-list" style="background:#fff; border:1px solid #ddd; border-radius:8px;">載入中...</div>
        <button class="btn-main" style="margin-top:20px;" onclick="window.submitOrder()">送出並取得隨機碼 🚀</button>
        <button class="btn-main" style="background:#795548; margin-top:10px;" onclick="window.showSection('buyer-lookup')">🔍 查詢我的訂單</button>
    </div>

    <div id="buyer-lookup" class="section">
        <h2>🔍 訂單狀態</h2>
        <input type="text" id="lookup-key" placeholder="輸入姓名查詢..." oninput="window.renderBuyerLookup()">
        <button class="btn-main" style="margin-bottom:15px; background:#888;" onclick="window.showSection('buyer-page')">返回下單</button>
        <div id="lookup-cards"></div>
    </div>

    <div id="admin-orders" class="section"><h2>📋 訂單總管</h2><div id="admin-order-cards"></div></div>
    <div id="admin-products" class="section">
        <h2>⚙️ 參數修改</h2>
        <div class="card" style="background:#eee;"><input type="text" id="p-name" placeholder="名稱"><input type="number" id="p-price" placeholder="價"><input type="number" id="p-stock" placeholder="存"><button class="btn-main" onclick="window.addProduct()">新增</button></div>
        <div id="admin-product-cards"></div>
    </div>
    <div id="admin-users" class="section"><h2>👤 帳號設定</h2><input type="text" id="new-admin-pass" placeholder="新代碼"><button class="btn-main" onclick="window.addAdmin()">新增</button><div id="admin-list-cards" style="margin-top:20px;"></div></div>
</div>

<div id="ticket-modal" class="custom-modal">
    <div class="modal-box">
        <div class="ticket">
            <h3>🧾 訂購憑證</h3>
            <p id="t-buyer"></p>
            <p id="t-detail"></p>
            <div style="background:#fff3cd; padding:10px;">
                <p style="margin:0; font-size:0.8rem;">🔑 簽收隨機碼：</p>
                <div class="random-code" id="t-random"></div>
            </div>
            <p style="color:red; font-size:0.8rem;">請截圖保存！領貨時需輸入此碼。</p>
        </div>
        <button class="btn-main" style="margin-top:15px;" onclick="location.reload()">我已截圖</button>
    </div>
</div>

<div id="verify-modal" class="custom-modal">
    <div class="modal-box">
        <h3>📦 確認領取商品</h3>
        <p>管理員已準備好您的商品，<br>請輸入您的 <b>隨機代碼</b> 進行簽收：</p>
        <input type="text" id="verify-input" placeholder="@××××××" style="text-align:center; font-size:1.5rem;">
        <button class="btn-main" id="confirm-verify-btn">確認簽收</button>
    </div>
</div>

<div id="login-modal" class="custom-modal"><div class="modal-box"><h3>管理登入</h3><input type="password" id="admin-pass-input" placeholder="@J108"><br><br><button class="btn-main" onclick="window.processAdminLogin()">登入</button><button class="btn-main" style="background:#888;" onclick="window.closeLogin()">取消</button></div></div>
<div id="msg-modal" class="custom-modal"><div class="modal-box"><h3 id="msg-title"></h3><p id="msg-text"></p><button class="btn-main" onclick="window.closeMsg()">確定</button></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWNgvwCRygbBz3X7qHwKwWpBxaqTezM2w",
        authDomain: "j108-erp-sf.firebaseapp.com",
        databaseURL: "https://j108-erp-sf-default-rtdb.firebaseio.com",
        projectId: "j108-erp-sf",
        storageBucket: "j108-erp-sf.firebasestorage.app",
        messagingSenderId: "882533412622",
        appId: "1:882533412622:web:fd8b88106875f927cf715f",
        measurementId: "G-RBWTME89M3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let products = [], orders = [], admins = [];

    const cls = document.getElementById('b-class'); for(let i=1; i<=20; i++) cls.add(new Option(i + " 班", i));
    const nos = document.getElementById('b-no'); for(let i=1; i<=50; i++) nos.add(new Option(i + " 號", i));

    window.enterApp = (role) => {
        document.getElementById('role-select').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        if(role === 'admin') { document.getElementById('admin-nav').style.display = 'flex'; window.showSection('admin-orders'); }
    };
    window.showSection = (id) => { document.querySelectorAll('.section').forEach(s => s.style.display = 'none'); document.getElementById(id).style.display = 'block'; };
    window.openAdminLogin = () => document.getElementById('login-modal').style.display = 'flex';
    window.closeLogin = () => document.getElementById('login-modal').style.display = 'none';
    window.customAlert = (t, txt) => { document.getElementById('msg-title').innerText = t; document.getElementById('msg-text').innerText = txt; document.getElementById('msg-modal').style.display = 'flex'; };
    window.closeMsg = () => document.getElementById('msg-modal').style.display = 'none';

    window.processAdminLogin = () => {
        const p = document.getElementById('admin-pass-input').value;
        if (p === "@J108" || admins.some(a => a.pass === p)) { window.closeLogin(); window.enterApp('admin'); }
        else { window.customAlert("失敗", "口令錯誤"); }
    };

    onValue(ref(db, 'products'), s => {
        products = s.val() ? Object.entries(s.val()).map(([id, v]) => ({ id, ...v })) : [];
        renderBuyerItems(); renderAdminProducts();
    });
    onValue(ref(db, 'orders'), s => {
        orders = s.val() ? Object.entries(s.val()).map(([id, v]) => ({ id, ...v })) : [];
        renderAdminOrders(); renderBuyerLookup();
    });
    onValue(ref(db, 'admins'), s => {
        admins = s.val() ? Object.entries(s.val()).map(([id, v]) => ({ id, ...v })) : [];
        renderAdminList();
    });

    function renderBuyerItems() {
        document.getElementById('buyer-item-list').innerHTML = products.map((p, i) => `
            <div class="product-row" onclick="const ck=this.querySelector('.b-check'); if(!ck.disabled) ck.checked=!ck.checked;">
                <input type="checkbox" class="b-check" onclick="event.stopPropagation();" ${p.stock <= 0 ? 'disabled' : ''}>
                <div style="flex:1;"><b>${p.name}</b> ($${p.price})<br><small>庫存: ${p.stock}</small></div>
                <input type="number" class="b-qty" value="1" min="1" max="${p.stock}" onclick="event.stopPropagation();" style="width:45px;">
            </div>
        `).join('');
    }

    window.submitOrder = () => {
        const name = document.getElementById('b-name').value;
        const info = `${document.getElementById('b-grade').value} ${document.getElementById('b-class').value}班 ${document.getElementById('b-no').value}號`;
        if(!name || document.getElementById('b-grade').value==="") return window.customAlert("錯誤", "資料不全");
        let details = [], total = 0, updates = {};
        const checks = document.querySelectorAll('.b-check'), qtys = document.querySelectorAll('.b-qty');
        checks.forEach((ck, i) => {
            if(ck.checked) {
                const q = parseInt(qtys[i].value), p = products[i];
                if(q > p.stock) return window.customAlert("不足", p.name);
                details.push(`${p.name}x${q}`); total += p.price * q;
                updates[`products/${p.id}/stock`] = p.stock - q;
            }
        });
        if(details.length === 0) return window.customAlert("錯誤", "未選商品");
        const rand = "@" + Math.floor(100000 + Math.random() * 900000);
        update(ref(db), updates).then(() => {
            const o = { ts: new Date().toLocaleString(), buyer: name, info, detail: details.join(", "), total, isPaid: false, shipStatus: "待配送", randCode: rand };
            push(ref(db, 'orders'), o).then(() => {
                document.getElementById('t-buyer').innerText = `${name} (${info})`;
                document.getElementById('t-detail').innerText = o.detail;
                document.getElementById('t-random').innerText = rand;
                document.getElementById('ticket-modal').style.display = 'flex';
            });
        });
    };

    window.renderBuyerLookup = () => {
        const k = document.getElementById('lookup-key').value.toLowerCase();
        const container = document.getElementById('lookup-cards');
        container.innerHTML = orders.filter(o => o.buyer.toLowerCase().includes(k)).reverse().map(o => {
            // 如果管理員設為配送中/完成，且該訂單尚未結案，則提示驗證
            const isDelivering = o.shipStatus === "配送中" || o.shipStatus === "已完成";
            const btnHtml = isDelivering ? `<button onclick="window.openVerify('${o.id}', '${o.randCode}')" style="background:var(--success); color:white; border:none; padding:8px; border-radius:5px; width:100%;">點此輸入隨機碼簽收</button>` : "";
            return `
                <div class="card">
                    <div style="float:right;">${o.isPaid ? '✅已付' : '❌未付'}</div>
                    <h3>${o.shipStatus}</h3>
                    <p>項目: ${o.detail}</p>
                    <p>總額: $${o.total}</p>
                    ${btnHtml}
                </div>
            `;
        }).join('');
    };

    window.openVerify = (id, correctCode) => {
        document.getElementById('verify-modal').style.display = 'flex';
        document.getElementById('confirm-verify-btn').onclick = () => {
            const input = document.getElementById('verify-input').value.trim();
            if(input === correctCode) {
                update(ref(db, `orders/${id}`), { shipStatus: "✅ 已簽收結案" }).then(() => {
                    window.customAlert("成功", "簽收成功！感謝購買。");
                    document.getElementById('verify-modal').style.display = 'none';
                    document.getElementById('verify-input').value = "";
                });
            } else {
                alert("隨機碼錯誤！請查看您的截圖。");
            }
        };
    };

    window.renderAdminOrders = () => {
        document.getElementById('admin-order-cards').innerHTML = orders.slice().reverse().map(o => `
            <div class="card">
                <div style="float:right; text-align:right;">
                    <button onclick="window.upSt('${o.id}', 'isPaid', ${o.isPaid})">${o.isPaid?'✅已付':'❌未付'}</button><br>
                    <small style="color:red; font-weight:bold;">驗證碼: ${o.randCode}</small>
                </div>
                <h3>${o.buyer} (${o.info})</h3>
                <p>內容: ${o.detail}</p>
                <select onchange="window.upSt('${o.id}', 'shipStatus', this.value)" style="width:auto;">
                    <option value="待配送" ${o.shipStatus=='待配送'?'selected':''}>待配送</option>
                    <option value="配送中" ${o.shipStatus=='配送中'?'selected':''}>配送中</option>
                    <option value="已完成" ${o.shipStatus=='已完成'?'selected':''}>已完成</option>
                    <option value="退款" ${o.shipStatus=='退款'?'selected':''}>退款</option>
                </select>
                <button onclick="window.delD('orders', '${o.id}')" style="background:red; color:white; border:none; padding:5px; border-radius:4px;">刪</button>
            </div>
        `).join('');
    };

    window.upSt = (id, k, v) => update(ref(db, `orders/${id}`), { [k]: (k === 'isPaid' ? !v : v) });

    window.renderAdminProducts = () => {
        document.getElementById('admin-product-cards').innerHTML = products.map(p => `
            <div class="card">
                <input type="text" id="edit-n-${p.id}" value="${p.name}">
                <div style="display:flex; gap:5px;">
                    <input type="number" id="edit-p-${p.id}" value="${p.price}" style="flex:1;">
                    <input type="number" id="edit-s-${p.id}" value="${p.stock}" style="flex:1;">
                </div>
                <button onclick="window.updateP('${p.id}')" style="background:var(--success); color:white; border:none; padding:10px; border-radius:5px; width:48%;">儲存</button>
                <button onclick="window.delD('products', '${p.id}')" style="background:red; color:white; border:none; padding:10px; border-radius:5px; width:48%;">刪除</button>
            </div>
        `).join('');
    };

    window.updateP = (id) => {
        const name = document.getElementById(`edit-n-${id}`).value;
        const price = parseInt(document.getElementById(`edit-p-${id}`).value);
        const stock = parseInt(document.getElementById(`edit-s-${id}`).value);
        update(ref(db, `products/${id}`), { name, price, stock }).then(() => window.customAlert("成功", "參數已更新"));
    };

    window.addProduct = () => {
        const n = document.getElementById('p-name').value, p = document.getElementById('p-price').value, s = document.getElementById('p-stock').value;
        if(n && p && s) push(ref(db, 'products'), { name: n, price: parseInt(p), stock: parseInt(s) });
    };

    window.addAdmin = () => {
        const v = document.getElementById('new-admin-pass').value;
        if(v) push(ref(db, 'admins'), { pass: v }).then(()=>document.getElementById('new-admin-pass').value='');
    };

    window.renderAdminList = () => {
        document.getElementById('admin-list-cards').innerHTML = admins.map((a, i) => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <span>👤 管理員密碼 #${i+1}</span>
                <button onclick="window.delD('admins', '${a.id}')" style="background:#888; color:white; border:none; padding:5px; border-radius:4px;">移除</button>
            </div>
        `).join('');
    };

    window.delD = (path, id) => { if(confirm("確定刪除？")) remove(ref(db, `${path}/${id}`)); };
</script>
</body>
</html>
