<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>J108 Club ｜ 核心控制台</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Playfair+Display:wght@700&display=swap');
        
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8439;
            --black: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
        }

        body { 
            font-family: 'Noto Serif TC', serif; 
            background: var(--black); 
            color: var(--text); 
            margin: 0; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
        }

        /* 高級滾動條 */
        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; box-sizing: border-box; }

        /* 奢華首頁 */
        #role-select { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 4rem; color: var(--gold); text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); margin-bottom: 0; }
        .sub-logo { letter-spacing: 5px; color: var(--dark-gold); margin-bottom: 40px; font-size: 0.8rem; }

        .role-btn { 
            width: 80%; max-width: 280px; padding: 18px; margin: 10px;
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            font-size: 1.1rem; cursor: pointer; border-radius: 0; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .role-btn::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: var(--gold); transition: 0.4s; z-index: -1; }
        .role-btn:hover { color: black; }
        .role-btn:hover::after { left: 0; }

        /* 導覽列 */
        nav { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 10px; display: none; justify-content: center; gap: 10px; border-bottom: 1px solid var(--gold); }
        nav button { background: none; border: 1px solid var(--dark-gold); color: var(--gold); padding: 8px 15px; font-size: 0.8rem; cursor: pointer; }

        /* 打手卡片設計 */
        .card { 
            background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.2); 
            border-radius: 4px; overflow: hidden; margin-bottom: 25px; 
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .card-img { width: 100%; height: 200px; object-fit: cover; filter: brightness(0.8); transition: 0.5s; }
        .card:hover .card-img { filter: brightness(1.1); transform: scale(1.02); }
        .card-content { padding: 20px; border-top: 1px solid rgba(212, 175, 55, 0.2); }
        
        /* 金錢顯示 */
        .price-tag { color: var(--gold); font-size: 1.5rem; font-weight: 900; margin: 10px 0; }
        .balance-label { background: var(--gold); color: black; padding: 2px 8px; font-size: 0.8rem; font-weight: bold; }

        /* 輸入框與主按鈕 */
        input, select { 
            width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid #333; 
            color: white; border-radius: 0; margin-bottom: 15px; box-sizing: border-box; 
        }
        input:focus { border-color: var(--gold); outline: none; }
        .btn-gold { background: var(--gold); color: black; border: none; padding: 18px; width: 100%; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        /* 彈窗 */
        .custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; }
        .modal-box { background: #111; padding: 40px; border: 1px solid var(--gold); width: 85%; max-width: 350px; text-align: center; }
        .random-code { font-size: 2.5rem; color: var(--gold); letter-spacing: 5px; margin: 20px 0; border: 1px solid #333; padding: 10px; }
    </style>
</head>
<body>

<div id="role-select">
    <div class="logo">J108</div>
    <div class="sub-logo">ELITE CLUB SYSTEM</div>
    <button class="role-btn" onclick="window.openPlayerLogin()">🗝️ 打手系統入口</button>
    <button class="role-btn" onclick="window.openAdminLogin()">⚙️ 核心控制台</button>
</div>

<nav id="admin-nav">
    <button onclick="window.showSection('admin-orders')">訂單監控</button>
    <button onclick="window.showSection('admin-products')">任務發布</button>
    <button onclick="window.showSection('admin-users')">打手帳號管理</button>
    <button onclick="location.reload()">系統登出</button>
</nav>

<div class="scroll-area" id="app-container" style="display:none;">
    
    <div id="player-dashboard" class="section">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color:var(--gold); margin:0;">任務牆</h2>
            <div id="player-info-display"></div>
        </div>
        <div id="mission-list">載入任務中...</div>
        <button class="role-btn" style="width:100%; max-width:none;" onclick="window.showSection('player-lookup')">🔍 查詢我的歷史訂單</button>
    </div>

    <div id="player-lookup" class="section">
        <h2 style="color:var(--gold);">歷史記錄</h2>
        <input type="text" id="lookup-code" placeholder="輸入隨機驗證碼查詢...">
        <button class="btn-gold" style="margin-bottom:20px;" onclick="window.renderPlayerLookup()">立即檢索</button>
        <div id="lookup-results"></div>
        <button class="role-btn" style="width:100%; max-width:none;" onclick="window.showSection('player-dashboard')">返回任務牆</button>
    </div>

    <div id="admin-orders" class="section">
        <h2 style="color:var(--gold);">訂單全局監控</h2>
        <div id="admin-order-cards"></div>
    </div>

    <div id="admin-products" class="section">
        <h2 style="color:var(--gold);">發布新任務</h2>
        <div class="card" style="padding:20px;">
            <input type="text" id="p-name" placeholder="任務名稱">
            <input type="text" id="p-img" placeholder="圖片連結 (建議使用 16:9 圖片)">
            <input type="number" id="p-price" placeholder="搶單價格 (需扣除之餘額)">
            <input type="number" id="p-stock" placeholder="限額人數">
            <button class="btn-gold" onclick="window.addProduct()">發布任務</button>
        </div>
        <div id="admin-product-cards"></div>
    </div>

    <div id="admin-users" class="section">
        <h2 style="color:var(--gold);">打手帳號與資金管理</h2>
        <div class="card" style="padding:20px;">
            <input type="text" id="u-id" placeholder="打手帳號 (自訂編號)">
            <input type="password" id="u-pass" placeholder="初始密碼">
            <input type="number" id="u-money" placeholder="初始資金">
            <button class="btn-gold" onclick="window.addPlayerUser()">新增打手</button>
        </div>
        <div id="player-user-list"></div>
    </div>
</div>

<div id="login-modal" class="custom-modal">
    <div class="modal-box">
        <h3 id="login-title" style="color:var(--gold);">身份驗證</h3>
        <input type="text" id="login-id" placeholder="帳號">
        <input type="password" id="login-pass" placeholder="口令">
        <button class="btn-gold" id="login-submit-btn">進入系統</button>
        <button class="role-btn" style="border:none; margin-top:10px;" onclick="window.closeLogin()">關閉</button>
    </div>
</div>

<div id="ticket-modal" class="custom-modal">
    <div class="modal-box">
        <h3 style="color:var(--gold);">搶單成功</h3>
        <p>這是您的專屬核銷隨機碼</p>
        <div class="random-code" id="t-random"></div>
        <p style="font-size:0.8rem; color:#888;">請務必截圖。憑此碼與管理員結算。</p>
        <button class="btn-gold" onclick="location.reload()">確認並退出</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWNgvwCRygbBz3X7qHwKwWpBxaqTezM2w",
        authDomain: "j108-erp-sf.firebaseapp.com",
        databaseURL: "https://j108-erp-sf-default-rtdb.firebaseio.com",
        projectId: "j108-erp-sf",
        storageBucket: "j108-erp-sf.firebasestorage.app",
        messagingSenderId: "882533412622",
        appId: "1:882533412622:web:fd8b88106875f927cf715f",
        measurementId: "G-RBWTME89M3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let products = [], orders = [], playerUsers = [], admins = [];
    let currentPlayer = null;

    // UI 控制
    window.showSection = (id) => { document.querySelectorAll('.section').forEach(s => s.style.display='none'); document.getElementById(id).style.display='block'; };
    window.openAdminLogin = () => {
        document.getElementById('login-modal').style.display='flex';
        document.getElementById('login-submit-btn').onclick = window.processAdminLogin;
    };
    window.openPlayerLogin = () => {
        document.getElementById('login-modal').style.display='flex';
        document.getElementById('login-submit-btn').onclick = window.processPlayerLogin;
    };
    window.closeLogin = () => document.getElementById('login-modal').style.display='none';

    // 登入邏輯
    window.processAdminLogin = () => {
        const pass = document.getElementById('login-pass').value;
        if(pass === "@J108") {
            window.closeLogin();
            document.getElementById('role-select').style.display='none';
            document.getElementById('app-container').style.display='block';
            document.getElementById('admin-nav').style.display='flex';
            window.showSection('admin-orders');
            initAdminFunctions();
        } else { alert('控制代碼錯誤'); }
    };

    window.processPlayerLogin = () => {
        const id = document.getElementById('login-id').value;
        const pass = document.getElementById('login-pass').value;
        const user = playerUsers.find(u => u.id === id && u.pass === pass);
        if(user) {
            currentPlayer = user;
            window.closeLogin();
            document.getElementById('role-select').style.display='none';
            document.getElementById('app-container').style.display='block';
            window.showSection('player-dashboard');
            updatePlayerUI();
        } else { alert('帳號或密碼錯誤'); }
    };

    function updatePlayerUI() {
        if(!currentPlayer) return;
        document.getElementById('player-info-display').innerHTML = `
            <span class="balance-label">打手 ID: ${currentPlayer.id}</span>
            <span style="color:var(--gold); margin-left:10px;">餘額: $${currentPlayer.money}</span>
        `;
    }

    // Firebase 監聽
    onValue(ref(db, 'products'), s => {
        products = s.val() ? Object.entries(s.val()).map(([id, v]) => ({ id, ...v })) : [];
        renderMissions();
        if(document.getElementById('admin-nav').style.display==='flex') renderAdminProducts();
    });
    onValue(ref(db, 'orders'), s => {
        orders = s.val() ? Object.entries(s.val()).map(([id, v]) => ({ id, ...v })) : [];
        if(document.getElementById('admin-nav').style.display==='flex') renderAdminOrders();
    });
    onValue(ref(db, 'playerUsers'), s => {
        playerUsers = s.val() ? Object.entries(s.val()).map(([dbKey, v]) => ({ dbKey, ...v })) : [];
        if(currentPlayer) {
            currentPlayer = playerUsers.find(u => u.id === currentPlayer.id);
            updatePlayerUI();
        }
        if(document.getElementById('admin-nav').style.display==='flex') renderPlayerUserList();
    });

    // 打手：渲染任務牆
    function renderMissions() {
        document.getElementById('mission-list').innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.img}" class="card-img" onerror="this.src='https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=400'">
                <div class="card-content">
                    <div style="font-size:1.2rem; font-weight:bold;">${p.name}</div>
                    <div class="price-tag">$${p.price}</div>
                    <div style="font-size:0.8rem; color:#888; margin-bottom:15px;">剩餘名額: ${p.stock}</div>
                    <button class="btn-gold" ${p.stock <= 0 ? 'disabled' : ''} onclick="window.takeMission('${p.id}')">
                        ${p.stock <= 0 ? '任務已滿' : '立即搶單 🗝️'}
                    </button>
                </div>
            </div>
        `).join('');
    }

    window.takeMission = async (pId) => {
        const p = products.find(x => x.id === pId);
        if(currentPlayer.money < p.price) return alert('資金不足，請聯繫管理員儲值');
        
        if(confirm(`確認消耗 $${p.price} 承接「${p.name}」任務嗎？`)) {
            const rand = "@" + Math.floor(100000 + Math.random() * 900000);
            const newMoney = currentPlayer.money - p.price;
            
            // 更新打手資金
            await update(ref(db, `playerUsers/${currentPlayer.dbKey}`), { money: newMoney });
            
            // 更新庫存
            await update(ref(db, `products/${pId}`), { stock: p.stock - 1 });

            // 建立訂單
            await push(ref(db, 'orders'), {
                player: currentPlayer.id,
                mission: p.name,
                price: p.price,
                code: rand,
                status: '進行中',
                ts: new Date().toLocaleString()
            });

            document.getElementById('t-random').innerText = rand;
            document.getElementById('ticket-modal').style.display = 'flex';
        }
    };

    window.renderPlayerLookup = () => {
        const code = document.getElementById('lookup-code').value;
        const result = orders.filter(o => o.player === currentPlayer.id && o.code === code);
        document.getElementById('lookup-results').innerHTML = result.map(o => `
            <div class="card" style="padding:15px;">
                <div style="color:var(--gold); font-weight:bold;">${o.mission}</div>
                <div>狀態: ${o.status}</div>
                <div style="font-size:0.8rem; color:#666;">日期: ${o.ts}</div>
                <button class="role-btn" style="width:100%; margin-top:10px;">🔗 藍新金流接口 (預留)</button>
            </div>
        `).join('') || '<p>查無此代碼紀錄</p>';
    };

    // 管理員功能
    function initAdminFunctions() {
        window.addPlayerUser = () => {
            const id = document.getElementById('u-id').value;
            const pass = document.getElementById('u-pass').value;
            const money = parseInt(document.getElementById('u-money').value);
            if(id && pass) push(ref(db, 'playerUsers'), { id, pass, money });
        };

        window.addProduct = () => {
            const name = document.getElementById('p-name').value;
            const img = document.getElementById('p-img').value;
            const price = parseInt(document.getElementById('p-price').value);
            const stock = parseInt(document.getElementById('p-stock').value);
            if(name && price) push(ref(db, 'products'), { name, img, price, stock });
        };
        
        window.delItem = (path, key) => { if(confirm('確定刪除？')) remove(ref(db, `${path}/${key}`)); };
    }

    function renderAdminOrders() {
        document.getElementById('admin-order-cards').innerHTML = orders.slice().reverse().map(o => `
            <div class="card" style="padding:15px;">
                <div style="display:flex; justify-content:space-between;">
                    <b>打手: ${o.player}</b>
                    <span style="color:var(--gold);">${o.code}</span>
                </div>
                <div>任務: ${o.mission}</div>
                <div style="font-size:0.8rem; color:#888;">${o.ts}</div>
                <select onchange="window.updateOrderStatus('${o.id}', this.value)" style="margin-top:10px;">
                    <option ${o.status==='進行中'?'selected':''}>進行中</option>
                    <option ${o.status==='已結案'?'selected':''}>已結案</option>
                    <option ${o.status==='異常'?'selected':''}>異常</option>
                </select>
            </div>
        `).join('');
    }
    window.updateOrderStatus = (id, val) => update(ref(db, `orders/${id}`), { status: val });

    function renderAdminProducts() {
        document.getElementById('admin-product-cards').innerHTML = products.map(p => `
            <div class="card" style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
                <div>${p.name} ($${p.price})</div>
                <button onclick="window.delItem('products', '${p.id}')" style="color:red; background:none; border:none;">刪除</button>
            </div>
        `).join('');
    }

    function renderPlayerUserList() {
        document.getElementById('player-user-list').innerHTML = playerUsers.map(u => `
            <div class="card" style="padding:15px;">
                <div style="display:flex; justify-content:space-between;">
                    <b>ID: ${u.id}</b>
                    <span>餘額: $${u.money}</span>
                </div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="role-btn" style="padding:5px; flex:1;" onclick="window.adjustMoney('${u.dbKey}', 100)">+100</button>
                    <button class="role-btn" style="padding:5px; flex:1;" onclick="window.adjustMoney('${u.dbKey}', -100)">-100</button>
                    <button onclick="window.delItem('playerUsers', '${u.dbKey}')" style="color:red; background:none; border:none;">刪除</button>
                </div>
            </div>
        `).join('');
    }
    window.adjustMoney = (dbKey, val) => {
        const u = playerUsers.find(x => x.dbKey === dbKey);
        update(ref(db, `playerUsers/${dbKey}`), { money: u.money + val });
    };

</script>
</body>
</html>
