<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J108 ERP ｜ 書法職人版</title>
    <style>
        /* 引用 Google Fonts 的 Noto Serif TC (明體/宋體，較有書卷氣) */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap');

        :root { 
            --deep-blue: #1a2a6c; 
            --danger: #e74c3c; 
            --success: #27ae60; 
            --veg-green: #2ecc71; 
        }

        body { 
            /* 優先使用楷體，營造書法感 */
            font-family: "KaiTi", "標楷體", "Kaiti TC", "Noto Serif TC", serif; 
            background: #fdfaf5; /* 換成淡淡的紙張色 */
            margin: 0; 
            padding-bottom: 50px; 
        }
        
        /* 標題加強書法感 */
        h2, h3 { 
            font-family: "Noto Serif TC", "標楷體", serif; 
            font-weight: 900;
            letter-spacing: 2px;
            color: #3e2723; /* 深木頭色 */
        }

        nav { 
            background: linear-gradient(to right, #1a2a6c, #8e24aa, #bf360c); 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }

        nav button { 
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255,255,255,0.4); 
            color: white; 
            padding: 10px 22px; 
            cursor: pointer; 
            border-radius: 5px; /* 書法體配方型微圓角較有質感 */
            font-weight: bold; 
            font-family: inherit;
        }

        nav button.active { background: #fff; color: #1a2a6c; box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        .container { 
            max-width: 1150px; 
            margin: 25px auto; 
            background: #fff; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #e0d7c6;
        }

        /* 智慧標籤 */
        .veg-tag { background: #5d4037; color: #fff; padding: 2px 8px; border-radius: 3px; font-size: 13px; font-weight: bold; }
        .priority-row { border-left: 8px solid #5d4037 !important; background: #fffcf5 !important; }
        .done-row { opacity: 0.4; filter: grayscale(100%); }

        /* 表格與狀態 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #3e2723; color: #fff; padding: 14px; text-align: left; font-size: 16px; }
        td { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 17px; }
        
        input, select { 
            font-family: inherit; 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #d7ccc8; 
            border-radius: 4px; 
            background: #fafafa;
        }

        .status-btn { border: none; background: none; font-size: 1.4rem; cursor: pointer; }
        
        /* 配送狀態選單美化 */
        .ship-select { 
            padding: 6px; 
            border-radius: 4px; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            font-family: inherit;
        }
        .wait { color: #795548; }
        .doing { background: #fff3cd; color: #856404; }
        .finish { background: #d4edda; color: #155724; }

        /* 彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { 
            background: #fff; 
            padding: 40px; 
            border-radius: 5px; 
            width: 85%; 
            max-width: 450px; 
            text-align: center; 
            border: 10px double #3e2723; /* 雙線邊框更有質感 */
        }
    </style>
</head>
