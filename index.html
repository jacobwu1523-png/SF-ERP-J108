<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>玄風密使系統 ｜ XF CLUB</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Noto+Sans+TC:wght@400;900&display=swap');
        
        :root {
            --xf-orange: #ff4d00;
            --xf-black: #111111;
            --xf-gray: #222222;
            --xf-white: #ffffff;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: var(--xf-black); 
            color: var(--xf-white); 
            margin: 0; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .scroll-area { flex: 1; overflow-y: auto; box-sizing: border-box; padding-bottom: 20px; }

        /* 首頁登入選擇 */
        #role-select { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 15px; }
        .xf-logo { font-family: 'Black Ops One', cursive; font-size: 4rem; color: var(--xf-orange); margin: 0; }
        .role-card { 
            width: 85%; max-width: 320px; padding: 25px; 
            background: var(--xf-gray); border-left: 5px solid var(--xf-orange);
            cursor: pointer; transition: 0.3s;
        }
        .role-card:hover { background: #333; }

        /* 導覽列 */
        nav { background: var(--xf-black); border-bottom: 2px solid var(--xf-orange); padding: 10px; display: none; justify-content: space-around; }
        nav button { background: none; border: 1px solid var(--xf-orange); color: var(--xf-orange); padding: 5px 15px; cursor: pointer; font-size: 0.8rem; }

        /* 買家介面：橫幅 */
        .banner { width: 100%; height: 180px; object-fit: cover; border-bottom: 3px solid var(--xf-orange); }

        /* 買家介面：商品卡片 (圖片正方形) */
        .item-grid { padding: 15px; display: grid; grid-template-columns: 1fr; gap: 20px; }
        .item-card { background: var(--xf-gray); display: flex; flex-direction: column; border-radius: 4px; overflow: hidden; }
        .item-top { display: flex; padding: 15px; gap: 15px; }
        .item-img { width: 120px; height: 120px; object-fit: cover; background: #000; flex-shrink: 0; }
        .item-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .item-title { font-size: 1.4rem; font-weight: 900; line-height: 1.2; }
        .item-price { font-family: 'Black Ops One', cursive; color: var(--xf-orange); font-size: 2rem; margin-top: 5px; }
        
        .order-btn { 
            background: var(--xf-orange); color: #000; border: none; 
            padding: 12px; font-weight: 900; font-size: 1.2rem; cursor: pointer; width: 100%;
        }

        /* 圖片中提到的風格塊 */
        .xf-section { background: #fff; color: #000; margin: 15px; padding: 15px; border-radius: 8px; }
        .xf-section h3 { margin: 0 0 10px 0; border-bottom: 2px solid #000; }
        .xf-label { font-weight: 900; font-size: 1.2rem; }

        /* 彈窗 */
        .custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .modal-box { background: var(--xf-gray); padding: 30px; border: 2px solid var(--xf-orange); width: 85%; max-width: 350px; }
        
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .btn-orange { background: var(--xf-orange); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="role-select">
    <h1 class="xf-logo">XF CLUB</h1>
    <div class="role-card" onclick="window.openLogin('buyer')">
        <div style="font-weight:900; font-size:1.5rem;">買家登入</div>
        <div style="color:var(--xf-orange);">BUYER ENTRANCE</div>
    </div>
    <div class="role-card" onclick="window.openLogin('player')">
        <div style="font-weight:900; font-size:1.5rem;">打手登入</div>
        <div style="color:var(--xf-orange);">PLAYER ENTRANCE</div>
    </div>
    <div class="role-card" style="border-color:#444;" onclick="window.openLogin('admin')">
        <div style="font-size:1rem; opacity:0.6;">管理員後台</div>
    </div>
</div>

<nav id="top-nav">
    <span id="user-display" style="font-size: 0.8rem; color: var(--xf-orange);"></span>
    <button onclick="location.reload()">登出</button>
</nav>

<div class="scroll-area" id="main-app" style="display:none;">
    <div id="buyer-mall" class="section">
        <img id="banner-img" src="https://via.placeholder.com/800x300?text=XF+CLUB+BANNER" class="xf-banner">
        <div class="item-grid" id="mall-items"></div>
    </div>

    <div id="buyer-order-form" class="section" style="padding: 15px;">
        <h2 style="font-family:'Black Ops One';">確認訂單</h2>
        <div class="xf-section" id="form-item-preview" style="background:var(--xf-gray); color:white;"></div>
        <div class="xf-section">
            <h3>下單信息</h3>
            <div class="xf-label">* 遊戲 UID</div>
            <input type="text" id="order-uid" placeholder="請輸入 UID">
            <div class="xf-label">* 遊戲名字</div>
            <input type="text" id="order-gamename" placeholder="請輸入角色名字">
            <div class="xf-label">下單備註</div>
            <input type="text" id="order-note" placeholder="可不填">
        </div>
        <button class="btn-orange" onclick="window.submitOrder()">確認提交任務 🚀</button>
    </div>

    <div id="order-list-page" class="section" style="padding: 15px;">
        <h2 id="list-title">訂單牆</h2>
        <div id="order-cards"></div>
    </div>

    <div id="admin-panel" class="section" style="padding: 15px;">
        <h3>系統設置</h3>
        <input type="text" id="set-banner" placeholder="更新橫幅圖片網址">
        <button class="btn-orange" onclick="window.updateBanner()">更新橫幅</button>
        <hr>
        <h3>發布新單品</h3>
        <input type="text" id="p-name" placeholder="單品名稱">
        <input type="text" id="p-img" placeholder="正方形圖片網址">
        <input type="number" id="p-price" placeholder="價格">
        <button class="btn-orange" onclick="window.addProduct()">上架物品</button>
        <hr>
        <h3>創建打手帳號</h3>
        <input type="text" id="new-player-id" placeholder="打手自訂編號">
        <button class="btn-orange" onclick="window.createPlayer()">產出專屬代碼</button>
        <div id="player-list" style="margin-top:20px;"></div>
    </div>
</div>

<div id="login-modal" class="custom-modal">
    <div class="modal-box">
        <h2 id="modal-title" style="color:var(--xf-orange);">登入</h2>
        <div id="buyer-reg-hint" style="font-size:0.8rem; margin-bottom:10px; display:none;">首次登入將自動創建帳號</div>
        <input type="text" id="login-id" placeholder="Gmail / 代碼 / admin">
        <input type="password" id="login-pass" placeholder="密碼 (管理員/買家需填)">
        <button class="btn-orange" onclick="window.auth()">進入系統</button>
        <button onclick="window.closeLogin()" style="background:none; border:none; color:#888; margin-top:10px; width:100%;">取消</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWNgvwCRygbBz3X7qHwKwWpBxaqTezM2w",
        authDomain: "j108-erp-sf.firebaseapp.com",
        databaseURL: "https://j108-erp-sf-default-rtdb.firebaseio.com",
        projectId: "j108-erp-sf",
        storageBucket: "j108-erp-sf.firebasestorage.app",
        messagingSenderId: "882533412622",
        appId: "1:882533412622:web:fd8b88106875f927cf715f",
        measurementId: "G-RBWTME89M3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let products = [], orders = [], users = [], players = [];
    let curRole = '', curUser = null, curProduct = null;

    // UI切換
    window.openLogin = (role) => {
        curRole = role;
        document.getElementById('modal-title').innerText = role === 'buyer' ? '買家登入' : (role === 'player' ? '打手登入' : '管理員登入');
        document.getElementById('buyer-reg-hint').style.display = role === 'buyer' ? 'block' : 'none';
        document.getElementById('login-modal').style.display = 'flex';
    };
    window.closeLogin = () => document.getElementById('login-modal').style.display = 'none';
    window.showSection = (id) => {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    };

    // 驗證邏輯
    window.auth = async () => {
        const id = document.getElementById('login-id').value.trim();
        const pass = document.getElementById('login-pass').value;

        if (curRole === 'admin') {
            if (id === 'admin' && pass === 'XuanFeng') { proceed('Admin'); } else { alert('管理員密碼錯誤'); }
        } else if (curRole === 'buyer') {
            if (!id.includes('@')) return alert('請輸入有效的 Gmail');
            const userRef = ref(db, `users/${id.replace(/\./g, '_')}`);
            const snap = await get(userRef);
            if (snap.exists()) {
                if (snap.val().pass === pass) { curUser = snap.val(); proceed(id); } else { alert('密碼錯誤'); }
            } else {
                await set(userRef, { id, pass });
                curUser = { id, pass }; proceed(id);
            }
        } else if (curRole === 'player') {
            const p = players.find(x => x.code === id);
            if (p) { curUser = p; proceed(`打手: ${p.name}`); } else { alert('無效的打手代碼'); }
        }
    };

    function proceed(display) {
        window.closeLogin();
        document.getElementById('role-select').style.display = 'none';
        document.getElementById('top-nav').style.display = 'flex';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('user-display').innerText = display;
        if (curRole === 'buyer') window.showSection('buyer-mall');
        else if (curRole === 'player') window.showSection('order-list-page');
        else window.showSection('admin-panel');
    }

    // 監聽
    onValue(ref(db, 'config'), s => { if(s.val()) document.getElementById('banner-img').src = s.val().banner; });
    onValue(ref(db, 'products'), s => {
        products = s.val() ? Object.entries(s.val()).map(([id, v]) => ({ id, ...v })) : [];
        renderMall();
    });
    onValue(ref(db, 'orders'), s => {
        orders = s.val() ? Object.entries(s.val()).map(([id, v]) => ({ id, ...v })) : [];
        renderOrders();
    });
    onValue(ref(db, 'players'), s => {
        players = s.val() ? Object.entries(s.val()).map(([id, v]) => ({ id, ...v })) : [];
        renderPlayerList();
    });

    // 買家功能
    function renderMall() {
        document.getElementById('mall-items').innerHTML = products.map(p => `
            <div class="item-card">
                <div class="item-top">
                    <img src="${p.img}" class="item-img">
                    <div class="item-info">
                        <div class="item-title">${p.name}</div>
                        <div class="item-price">$${p.price}</div>
                    </div>
                </div>
                <button class="order-btn" onclick="window.toForm('${p.id}')">立即下單任務</button>
            </div>
        `).join('');
    }

    window.toForm = (id) => {
        curProduct = products.find(x => x.id === id);
        document.getElementById('form-item-preview').innerHTML = `
            <div style="display:flex; gap:15px; align-items:center;">
                <img src="${curProduct.img}" style="width:80px; height:80px; border:2px solid var(--xf-orange);">
                <div>
                    <div style="font-weight:900; font-size:1.2rem;">${curProduct.name}</div>
                    <div style="color:var(--xf-orange); font-size:1.5rem; font-family:'Black Ops One';">$${curProduct.price}</div>
                </div>
            </div>
        `;
        window.showSection('buyer-order-form');
    };

    window.submitOrder = () => {
        const uid = document.getElementById('order-uid').value;
        const name = document.getElementById('order-gamename').value;
        if (!uid || !name) return alert('必填項不可為空');
        push(ref(db, 'orders'), {
            buyer: curUser.id,
            product: curProduct.name,
            price: curProduct.price,
            uid, name,
            note: document.getElementById('order-note').value,
            status: '待接單',
            ts: new Date().toLocaleString()
        }).then(() => { alert('下單成功！'); window.showSection('buyer-mall'); });
    };

    // 訂單清單 (打手/管理員)
    function renderOrders() {
        document.getElementById('order-cards').innerHTML = orders.map(o => `
            <div class="xf-section" style="background:#222; color:#fff; border:1px solid ${o.status==='待接單'?'#ff4d00':'#444'}">
                <div style="float:right; color:var(--xf-orange); font-weight:900;">${o.status}</div>
                <div style="font-weight:900; font-size:1.2rem;">${o.product}</div>
                <p>💸 價格: $${o.price}</p>
                <div style="background:#111; padding:10px; margin-top:10px; font-size:0.9rem;">
                    <b>老闆資料：</b><br>
                    UID: ${o.uid}<br>
                    名字: ${o.name}<br>
                    備註: ${o.note || '無'}
                </div>
                ${curRole === 'player' && o.status === '待接單' ? 
                    `<button class="btn-orange" style="margin-top:10px;" onclick="window.takeOrder('${o.id}')">接下此單任務</button>` : ''}
                ${curRole === 'admin' ? `<button onclick="window.delOrder('${o.id}')" style="background:red; color:white; border:none; margin-top:10px; padding:5px;">刪除單據</button>` : ''}
            </div>
        `).join('') || '目前牆上沒有任務';
    }

    window.takeOrder = (id) => {
        update(ref(db, `orders/${id}`), { status: `已由 ${curUser.name} 接單` });
    };

    // 管理員功能
    window.updateBanner = () => {
        const url = document.getElementById('set-banner').value;
        update(ref(db, 'config'), { banner: url });
    };
    window.addProduct = () => {
        const name = document.getElementById('p-name').value;
        const img = document.getElementById('p-img').value;
        const price = document.getElementById('p-price').value;
        push(ref(db, 'products'), { name, img, price });
    };
    window.createPlayer = () => {
        const name = document.getElementById('new-player-id').value;
        const code = "@" + Math.floor(100000 + Math.random() * 900000);
        push(ref(db, 'players'), { name, code });
    };
    function renderPlayerList() {
        document.getElementById('player-list').innerHTML = "打手列表：<br>" + players.map(p => `
            <div class="card" style="padding:10px; margin-bottom:5px; background:#222;">
                <b>${p.name}</b> 代碼：<span style="color:var(--xf-orange);">${p.code}</span>
            </div>
        `).join('');
    }
    window.delOrder = (id) => { if(confirm('確定刪除？')) remove(ref(db, `orders/${id}`)); };

</script>
</body>
</html>
