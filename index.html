<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J108 ERP 系統 ｜ 狀態追蹤版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        :root { --deep-blue: #1a2a6c; --text-dark: #2c3e50; --danger: #e74c3c; --success: #27ae60; --warning: #f39c12; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #eef2f3; color: var(--text-dark); margin: 0; }
        nav { background: linear-gradient(to right, #1a2a6c, #b21f1f, #fdbb2d); padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
        nav button { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.5); color: white; padding: 10px 20px; cursor: pointer; border-radius: 30px; font-weight: bold; }
        nav button.active { background: white; color: var(--deep-blue); }
        .container { max-width: 1100px; margin: 30px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 10px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; }
        .product-list { border: 2px solid #f0f4f8; border-radius: 15px; background: #fafbfc; margin-bottom: 20px; padding: 10px; }
        .product-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .btn-main { background: var(--deep-blue); color: white; padding: 12px 25px; border: none; border-radius: 10px; font-size: 1.1rem; cursor: pointer; }
        .btn-del { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th { background: var(--deep-blue); color: white; padding: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .search-bar { background: #f0f7ff; padding: 15px; border-radius: 15px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        
        /* 狀態樣式 */
        .status-paid { color: var(--success); font-weight: bold; }
        .status-unpaid { color: var(--danger); font-weight: bold; }
        .ship-waiting { background: #eee; color: #666; padding: 4px 8px; border-radius: 5px; }
        .ship-doing { background: #fff3cd; color: #856404; padding: 4px 8px; border-radius: 5px; border: 1px solid #ffeeba; }
        .ship-done { background: #d4edda; color: #155724; padding: 4px 8px; border-radius: 5px; }
        .row-finished { opacity: 0.5; background: #f8f9fa !important; }
    </style>
</head>
<body>

<nav>
    <button onclick="showPage('order-ui')" id="btn-order">✨ 我要下單</button>
    <button onclick="showPage('admin-ui')" id="btn-admin">📋 訂單管理</button>
    <button onclick="showPage('config-ui')" id="btn-config">⚙️ 商品設定</button>
</nav>

<div class="container">
    <div id="order-ui" class="page-content active">
        <h2>🌙 填寫訂購單</h2>
        <div class="info-grid">
            <input type="text" id="grade" placeholder="年級">
            <input type="text" id="class" placeholder="班級">
            <input type="number" id="no" placeholder="座號">
        </div>
        <input type="text" id="buyer" placeholder="買家姓名" style="margin-bottom: 20px;">
        <div id="itemSelection" class="product-list">載入雲端商品中...</div>
        <div style="text-align:right">應付總額：<span style="font-size:2rem;color:red">$ <span id="grandTotal">0</span></span></div>
        <button class="btn-main" style="width:100%; margin-top:20px;" onclick="handleOrderSubmit()">提交訂單 🚀</button>
    </div>

    <div id="admin-ui" class="page-content">
        <h2>📋 訂單動態追蹤</h2>
        <div class="search-bar">
            🔍 <input type="text" id="searchInput" placeholder="搜尋姓名、班級或配送狀態..." oninput="renderOrders()">
        </div>
        <table id="orderTableRoot">
            <thead>
                <tr>
                    <th>付款</th>
                    <th>配送狀態</th>
                    <th>買家資訊</th>
                    <th>內容</th>
                    <th>金額</th>
                    <th>管理</th>
                </tr>
            </thead>
            <tbody id="orderTable"></tbody>
        </table>
    </div>

    <div id="config-ui" class="page-content">
        <h2>⚙️ 商品上架管理</h2>
        <div class="info-grid" style="grid-template-columns: 2fr 1fr 1fr;">
            <input type="text" id="pName" placeholder="商品名稱">
            <input type="number" id="pPrice" placeholder="單價">
            <button class="btn-main" onclick="handleAddProduct()" style="margin:0;">上架</button>
        </div>
        <table>
            <thead><tr><th>商品名稱</th><th>單價</th><th>操作</th></tr></thead>
            <tbody id="productManageTable"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWNgvwCRygbBz3X7qHwKwWpBxaqTezM2w",
        authDomain: "j108-erp-sf.firebaseapp.com",
        databaseURL: "https://j108-erp-sf-default-rtdb.firebaseio.com",
        projectId: "j108-erp-sf",
        storageBucket: "j108-erp-sf.firebasestorage.app",
        messagingSenderId: "882533412622",
        appId: "1:882533412622:web:fd8b88106875f927cf715f",
        measurementId: "G-RBWTME89M3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let currentProducts = [];
    let allOrders = [];

    window.showPage = (id) => {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + id.split('-')[0]).classList.add('active');
    };

    // --- 商品管理 ---
    onValue(ref(db, 'products'), (snapshot) => {
        const data = snapshot.val();
        currentProducts = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
        renderOrderUI();
        renderConfigUI();
    });

    window.handleAddProduct = () => {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        if(name && price) {
            push(ref(db, 'products'), { name, price: parseInt(price) });
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
        }
    };

    window.delProd = (id) => { if(confirm("確定刪除商品？")) remove(ref(db, `products/${id}`)); };

    function renderConfigUI() {
        document.getElementById('productManageTable').innerHTML = currentProducts.map(p => `
            <tr><td>${p.name}</td><td>$${p.price}</td><td><button class="btn-del" onclick="delProd('${p.id}')">刪除</button></td></tr>
        `).join('');
    }

    // --- 訂單下單 ---
    function renderOrderUI() {
        const container = document.getElementById('itemSelection');
        container.innerHTML = currentProducts.map((p, i) => `
            <div class="product-item">
                <input type="checkbox" class="p-check" onchange="updateSum()">
                <div style="flex:1; margin-left:10px;"><b>${p.name}</b> ($${p.price})</div>
                <input type="number" class="p-qty" value="1" min="1" style="width:60px;" oninput="updateSum()">
            </div>
        `).join('') || "目前無商品。";
    }

    window.updateSum = () => {
        let total = 0;
        document.querySelectorAll('.product-item').forEach((item, i) => {
            if(item.querySelector('.p-check').checked) {
                total += currentProducts[i].price * item.querySelector('.p-qty').value;
            }
        });
        document.getElementById('grandTotal').innerText = total.toLocaleString();
    };

    window.handleOrderSubmit = () => {
        const buyer = document.getElementById('buyer').value;
        if(!buyer) return alert("請填寫買家姓名");
        let details = [];
        document.querySelectorAll('.product-item').forEach((item, i) => {
            if(item.querySelector('.p-check').checked) {
                details.push(`${currentProducts[i].name}x${item.querySelector('.p-qty').value}`);
            }
        });
        if(details.length === 0) return alert("請勾選商品");

        push(ref(db, 'orders'), {
            ts: new Date().toLocaleString('zh-TW', {hour12:false}),
            info: `${document.getElementById('grade').value}-${document.getElementById('class').value} / ${document.getElementById('no').value}號`,
            buyer, detail: details.join(", "), 
            total: document.getElementById('grandTotal').innerText,
            isPaid: false,        // 初始付款狀態：未付
            shipStatus: "待配送"   // 初始配送狀態
        }).then(() => { alert("訂單成功送出！"); location.reload(); });
    };

    // --- 訂單管理與搜尋 ---
    onValue(ref(db, 'orders'), (snapshot) => {
        const data = snapshot.val();
        allOrders = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
        renderOrders();
    });

    window.renderOrders = () => {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const tb = document.getElementById('orderTable');
        
        const filtered = allOrders.filter(o => 
            o.buyer.toLowerCase().includes(keyword) || 
            o.info.toLowerCase().includes(keyword) ||
            o.shipStatus.includes(keyword)
        );

        tb.innerHTML = filtered.reverse().map(o => {
            let shipClass = o.shipStatus === "待配送" ? "ship-waiting" : (o.shipStatus === "配送中" ? "ship-doing" : "ship-done");
            let rowClass = o.shipStatus === "已完成" ? "row-finished" : "";

            return `
                <tr class="${rowClass}">
                    <td>
                        <button onclick="togglePaid('${o.id}', ${o.isPaid})" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">
                            ${o.isPaid ? '✅ <small class="status-paid">已付</small>' : '❌ <small class="status-unpaid">未付</small>'}
                        </button>
                    </td>
                    <td>
                        <select onchange="updateShip('${o.id}', this.value)" class="${shipClass}" style="width:auto; border:none;">
                            <option value="待配送" ${o.shipStatus === '待配送' ? 'selected' : ''}>待配送</option>
                            <option value="配送中" ${o.shipStatus === '配送中' ? 'selected' : ''}>配送中</option>
                            <option value="已完成" ${o.shipStatus === '已完成' ? 'selected' : ''}>已完成</option>
                        </select>
                    </td>
                    <td><b>${o.buyer}</b><br><small>${o.info}</small></td>
                    <td><small>${o.detail}</small></td>
                    <td style="color:red; font-weight:bold">$${o.total}</td>
                    <td><button class="btn-del" onclick="delOrder('${o.id}')">刪除</button></td>
                </tr>
            `;
        }).join('') || "<tr><td colspan='6' style='text-align:center'>目前無相符訂單</td></tr>";
    };

    // 更新狀態功能
    window.togglePaid = (id, current) => {
        update(ref(db, `orders/${id}`), { isPaid: !current });
    };

    window.updateShip = (id, newStatus) => {
        update(ref(db, `orders/${id}`), { shipStatus: newStatus });
    };

    window.delOrder = (id) => { if(confirm("確定刪除訂單？")) remove(ref(db, `orders/${id}`)); };

</script>
</body>
</html>
