<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>J108 ERP ｜ 訂單修復穩定版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&display=swap');
        :root { --ink: #3e2723; --paper: #fdfaf5; --danger: #e74c3c; --success: #2ecc71; --brown: #795548; --accent: #fbc02d; }
        
        body { font-family: "KaiTi", "標楷體", serif; background: var(--paper); color: var(--ink); margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; box-sizing: border-box; }

        #role-select { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 20px; }
        .role-btn { width: 85%; max-width: 300px; padding: 20px; font-size: 1.5rem; cursor: pointer; border: 4px double var(--ink); background: white; font-family: inherit; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        nav { background: var(--ink); padding: 10px; display: none; justify-content: center; gap: 8px; flex-wrap: wrap; z-index: 1000; }
        nav button { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; }

        .card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.06); border: 1px solid #eee; position: relative; }
        input, select { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 10px; font-family: inherit; font-size: 1rem; margin-bottom: 10px; box-sizing: border-box; }
        .btn-main { background: var(--ink); color: white; padding: 16px; border: none; cursor: pointer; font-family: inherit; border-radius: 10px; width: 100%; font-size: 1.2rem; font-weight: bold; }
        .btn-main:disabled { background: #ccc !important; }

        .product-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        .b-check { width: 32px; height: 32px; margin-right: 12px; }

        .custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-box { background: var(--paper); padding: 25px; border: 6px double var(--ink); width: 85%; max-width: 360px; text-align: center; }
        .random-code-display { font-size: 2.2rem; font-weight: bold; color: var(--danger); letter-spacing: 2px; margin: 15px 0; border: 2px dashed #ccc; padding: 10px; background: #fff; }
        .copy-btn { background: var(--brown); color: white; border: none; padding: 10px; border-radius: 5px; margin-bottom: 10px; cursor: pointer; width: 100%; font-family: inherit; }
    </style>
</head>
<body>

<div id="role-select">
    <h1 style="font-size: 3.5rem; margin: 0; letter-spacing: 5px;">J108</h1>
    <button class="role-btn" onclick="window.enterBuyer()">🛍️ 我要下單</button>
    <button class="role-btn" onclick="window.enterBuyerLookup()">🔍 憑碼查訂單</button>
    <button class="role-btn" style="font-size: 1rem; padding: 10px;" onclick="window.openAdminLogin()">⚙️ 管理員登入</button>
</div>

<nav id="admin-nav">
    <button onclick="window.showSection('admin-orders')">📋 訂單管理</button>
    <button onclick="window.showSection('admin-products')">⚙️ 修改參數</button>
    <button onclick="window.showSection('admin-users')">👤 帳號密碼</button>
    <button onclick="location.reload()" style="background:#b71c1c;">🚪 登出</button>
</nav>

<div class="scroll-area" id="app-container" style="display:none;">
    <div id="buyer-page" class="section">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--brown); margin-bottom:10px;">⬅ 返回</button>
        <h2>🖋️ 填寫訂單</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <select id="b-grade">
                <option value="" disabled selected>年級</option>
                <option value="國一">國一</option><option value="國二">國二</option><option value="國三">國三</option>
                <option value="高一">高一</option><option value="高二">高二</option><option value="高三">高三</option>
            </select>
            <select id="b-class"><option value="" disabled selected>班級</option></select>
            <select id="b-no" style="grid-column: span 2;"><option value="" disabled selected>座號</option></select>
        </div>
        <input type="text" id="b-name" placeholder="您的真實姓名">
        <div id="buyer-item-list" style="background:#fff; border:1px solid #ddd; border-radius:10px;"></div>
        <button class="btn-main" style="margin-top:25px;" onclick="window.submitOrder()">確認送出 🚀</button>
    </div>

    <div id="buyer-lookup" class="section">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--brown); margin-bottom:10px;">⬅ 返回</button>
        <h2>🔍 憑碼查詢</h2>
        <input type="text" id="lookup-code" placeholder="輸入截圖上的 @隨機碼" oninput="window.renderBuyerLookup()">
        <div id="lookup-cards"></div>
    </div>

    <div id="admin-orders" class="section">
        <h2>📋 訂單總管</h2>
        <div id="admin-order-cards">載入訂單中...</div>
    </div>
    
    <div id="admin-products" class="section">
        <h2>⚙️ 修改參數</h2>
        <div class="card" style="background:#eee;"><input type="text" id="p-name" placeholder="名稱"><input type="number" id="p-price" placeholder="價"><input type="number" id="p-stock" placeholder="存"><button class="btn-main" onclick="window.addProduct()">新增</button></div>
        <div id="admin-product-cards"></div>
    </div>
    
    <div id="admin-users" class="section">
        <h2>👤 帳號密碼設定</h2>
        <input type="text" id="new-admin-pass" placeholder="新代碼">
        <button class="btn-main" onclick="window.addAdmin()">新增</button>
        <div id="admin-list-cards" style="margin-top:20px;"></div>
    </div>
</div>

<div id="ticket-modal" class="custom-modal">
    <div class="modal-box">
        <h3>🧾 訂購憑證</h3>
        <p id="t-buyer" style="border-bottom: 1px dashed #ccc; padding-bottom:10px;"></p>
        <div style="background:#fff3cd; padding:15px; border-radius:10px;">
            <p style="margin:0; font-size:0.9rem; font-weight:bold; color:#856404;">🔑 簽收隨機碼：</p>
            <div class="random-code-display" id="t-random"></div>
            <button class="copy-btn" id="copy-action-btn" onclick="window.copyCode()">點此複製隨機碼</button>
        </div>
        <button class="btn-main" id="ticket-close-btn" style="margin-top:10px;" onclick="location.reload()" disabled>我已截圖/複製</button>
    </div>
</div>

<div id="verify-modal" class="custom-modal">
    <div class="modal-box">
        <h3>📦 簽收驗證</h3>
        <p>請輸入您的 <b>隨機代碼</b>：</p>
        <input type="text" id="verify-input" placeholder="@××××××" style="text-align:center; font-size:1.6rem;">
        <button class="btn-main" id="confirm-verify-btn">確認簽收</button>
        <button class="btn-main" style="background:#888; margin-top:10px;" onclick="document.getElementById('verify-modal').style.display='none'">取消</button>
    </div>
</div>

<div id="login-modal" class="custom-modal"><div class="modal-box"><h3>管理驗證</h3><input type="password" id="admin-pass-input" placeholder="口令"><div style="display:flex; gap:10px; margin-top:15px;"><button class="btn-main" onclick="window.processAdminLogin()">進入</button><button class="btn-main" style="background:#888;" onclick="window.closeLogin()">取消</button></div></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCWNgvwCRygbBz3X7qHwKwWpBxaqTezM2w",
        authDomain: "j108-erp-sf.firebaseapp.com",
        databaseURL: "https://j108-erp-sf-default-rtdb.firebaseio.com",
        projectId: "j108-erp-sf",
        storageBucket: "j108-erp-sf.firebasestorage.app",
        messagingSenderId: "882533412622",
        appId: "1:882533412622:web:fd8b88106875f927cf715f",
        measurementId: "G-RBWTME89M3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let products = [], orders = [], admins = [];

    // 初始化選單
    const cls = document.getElementById('b-class'); for(let i=1; i<=20; i++) cls.add(new Option(i + " 班", i));
    const nos = document.getElementById('b-no'); for(let i=1; i<=50; i++) nos.add(new Option(i + " 號", i));

    window.enterBuyer = () => { document.getElementById('role-select').style.display = 'none'; document.getElementById('app-container').style.display = 'block'; window.showSection('buyer-page'); };
    window.enterBuyerLookup = () => { document.getElementById('role-select').style.display = 'none'; document.getElementById('app-container').style.display = 'block'; window.showSection('buyer-lookup'); };
    window.showSection = (id) => { document.querySelectorAll('.section').forEach(s => s.style.display = 'none'); document.getElementById(id).style.display = 'block'; };
    window.openAdminLogin = () => document.getElementById('login-modal').style.display = 'flex';
    window.closeLogin = () => document.getElementById('login-modal').style.display = 'none';

    window.processAdminLogin = () => {
        const p = document.getElementById('admin-pass-input').value;
        if (p === "@J108" || admins.some(a => a.pass === p)) { 
            window.closeLogin(); 
            document.getElementById('role-select').style.display = 'none';
            document.getElementById('app-container').style.display = 'block';
            document.getElementById('admin-nav').style.display = 'flex'; 
            initAdminFunctions(); 
            window.showSection('admin-orders');
            renderAdminOrders(); // 強制先執行一次渲染
        } else { alert("驗證無效"); }
    };

    function initAdminFunctions() {
        window.addProduct = () => {
            const n = document.getElementById('p-name').value, p = document.getElementById('p-price').value, s = document.getElementById('p-stock').value;
            if(n && p && s) push(ref(db, 'products'), { name: n, price: parseInt(p), stock: parseInt(s) });
        };
        window.updateP = (id) => {
            const n = document.getElementById(`edit-n-${id}`).value, p = parseInt(document.getElementById(`edit-p-${id}`).value), s = parseInt(document.getElementById(`edit-s-${id}`).value);
            update(ref(db, `products/${id}`), { name: n, price: p, stock: s }).then(() => alert("已更新"));
        };
        window.upSt = (id, k, v) => {
            const order = orders.find(o => o.id === id);
            if (!order) return;
            if (k === 'shipStatus' && (v === '已完成' || v === '配送中')) {
                if (!order.isPaid) { if (!confirm(`⚠️ 買家尚未付款！確定強行切換嗎？`)) return; }
            }
            let val = (k === 'isPaid' ? !v : v);
            update(ref(db, `orders/${id}`), { [k]: val });
        };
        window.addAdmin = () => {
            const v = document.getElementById('new-admin-pass').value;
            if(v) push(ref(db, 'admins'), { pass: v }).then(()=>document.getElementById('new-admin-pass').value='');
        };
        window.delD = (path, id) => { if(confirm("確定刪除？")) remove(ref(db, `${path}/${id}`)); };
    }

    // [核心修正：監聽器改為即時觸核]
    onValue(ref(db, 'products'), s => {
        const data = s.val();
        products = data ? Object.entries(data).map(([id, v]) => ({ id, ...v })) : [];
        renderBuyerItems(); 
        if(document.getElementById('admin-nav').style.display === 'flex') renderAdminProducts();
    });

    onValue(ref(db, 'orders'), s => {
        const data = s.val();
        orders = data ? Object.entries(data).map(([id, v]) => ({ id, ...v })) : [];
        if(document.getElementById('admin-nav').style.display === 'flex') renderAdminOrders();
        renderBuyerLookup();
    });

    onValue(ref(db, 'admins'), s => {
        const data = s.val();
        admins = data ? Object.entries(data).map(([id, v]) => ({ id, ...v })) : [];
        if(document.getElementById('admin-nav').style.display === 'flex') renderAdminList();
    });

    function renderBuyerItems() {
        document.getElementById('buyer-item-list').innerHTML = products.map((p, i) => `
            <div class="product-row" onclick="const ck=this.querySelector('.b-check'); if(!ck.disabled) ck.checked=!ck.checked;">
                <input type="checkbox" class="b-check" onclick="event.stopPropagation();" ${p.stock <= 0 ? 'disabled' : ''}>
                <div style="flex:1;"><b>${p.name}</b> ($${p.price})<br><small>庫存: ${p.stock}</small></div>
                <input type="number" class="b-qty" value="1" min="1" max="${p.stock}" onclick="event.stopPropagation();" style="width:45px;">
            </div>
        `).join('');
    }

    window.copyCode = () => {
        const codeText = document.getElementById('t-random').innerText;
        navigator.clipboard.writeText(codeText).then(() => {
            document.getElementById('ticket-close-btn').disabled = false;
            document.getElementById('copy-action-btn').innerText = "✅ 複製成功";
            document.getElementById('copy-action-btn').style.background = "#27ae60";
        });
    };

    window.submitOrder = () => {
        const name = document.getElementById('b-name').value, grade = document.getElementById('b-grade').value;
        if(!name || !grade) return alert("資料不全");
        let details = [], total = 0, updates = {};
        const checks = document.querySelectorAll('.b-check'), qtys = document.querySelectorAll('.b-qty');
        checks.forEach((ck, i) => { if(ck.checked) { const q = parseInt(qtys[i].value), p = products[i]; details.push(`${p.name}x${q}`); total += p.price * q; updates[`products/${p.id}/stock`] = p.stock - q; } });
        if(details.length === 0) return alert("未選商品");
        const rand = "@" + Math.floor(100000 + Math.random() * 900000);
        update(ref(db), updates).then(() => {
            const info = `${grade} ${document.getElementById('b-class').value}班 ${document.getElementById('b-no').value}號`;
            push(ref(db, 'orders'), { ts: new Date().toLocaleString(), buyer: name, info, detail: details.join(", "), total, isPaid: false, shipStatus: "待配送", randCode: rand }).then(() => {
                document.getElementById('t-buyer').innerText = name + " (" + info + ")";
                document.getElementById('t-random').innerText = rand;
                document.getElementById('ticket-modal').style.display = 'flex';
            });
        });
    };

    window.renderBuyerLookup = () => {
        const code = document.getElementById('lookup-code').value.trim();
        const container = document.getElementById('lookup-cards');
        if(!code) { container.innerHTML = ""; return; }
        const matched = orders.filter(o => o.randCode === code);
        container.innerHTML = matched.map(o => `
            <div class="card">
                <div style="float:right; font-weight:bold;">${o.isPaid ? '✅已收款' : '❌待付款'}</div>
                <h3 style="color:var(--danger); margin:0;">狀態：${o.shipStatus}</h3>
                <p>項目: ${o.detail}</p><p>總額: $${o.total}</p>
                ${(o.shipStatus.includes("中") || o.shipStatus === "已完成") ? `<button onclick="window.openVerify('${o.id}', '${o.randCode}')" style="background:var(--success); color:white; border:none; padding:15px; border-radius:10px; width:100%; margin-top:10px; font-weight:bold;">✅ 我領到貨了 (點此簽收)</button>` : ""}
            </div>
        `).join('') || (code.length >= 7 ? "<p style='text-align:center;'>找不到訂單</p>" : "");
    };

    window.openVerify = (id, correctCode) => {
        document.getElementById('verify-modal').style.display = 'flex';
        document.getElementById('confirm-verify-btn').onclick = () => {
            if(document.getElementById('verify-input').value.trim() === correctCode) {
                update(ref(db, `orders/${id}`), { shipStatus: "✅ 已簽收領取" }).then(() => {
                    alert("簽收成功！"); document.getElementById('verify-modal').style.display = 'none';
                });
            } else { alert("隨機碼錯誤！"); }
        };
    };

    // --- 管理員渲染功能 ---
    function renderAdminOrders() {
        const container = document.getElementById('admin-order-cards');
        if (!orders.length) { container.innerHTML = "目前暫無訂單"; return; }
        container.innerHTML = orders.slice().reverse().map(o => `
            <div class="card">
                <div style="float:right; text-align:right;">
                    <button onclick="window.upSt('${o.id}', 'isPaid', ${o.isPaid})" style="font-weight:bold; color:${o.isPaid?'green':'red'}; background:none; border:none; cursor:pointer;">${o.isPaid?'✅已付':'❌未付'}</button><br>
                    <small style="color:red; font-weight:bold;">碼: ${o.randCode || '無'}</small>
                </div>
                <h3 style="margin:0;">${o.buyer}</h3>
                <p style="font-size:0.85rem; color:#888;">${o.ts}</p>
                <p>項目: ${o.detail}</p>
                <select onchange="window.upSt('${o.id}', 'shipStatus', this.value)" style="width:auto; padding:5px;">
                    <option value="待配送" ${o.shipStatus=='待配送'?'selected':''}>待配送</option>
                    <option value="配送中" ${o.shipStatus=='配送中'?'selected':''}>配送中</option>
                    <option value="已完成" ${o.shipStatus=='已完成'?'selected':''}>已完成</option>
                    <option value="退款" ${o.shipStatus=='退款'?'selected':''}>退款</option>
                </select>
                <button onclick="window.delD('orders', '${o.id}')" style="background:red; color:white; border:none; border-radius:4px; padding:5px 10px; margin-left:5px;">刪</button>
            </div>
        `).join('');
    }

    function renderAdminProducts() {
        document.getElementById('admin-product-cards').innerHTML = products.map(p => `
            <div class="card">
                <input type="text" id="edit-n-${p.id}" value="${p.name}">
                <div style="display:flex; gap:5px;"><input type="number" id="edit-p-${p.id}" value="${p.price}" style="flex:1;"><input type="number" id="edit-s-${p.id}" value="${p.stock}" style="flex:1;"></div>
                <div style="display:flex; gap:10px;">
                    <button onclick="window.updateP('${p.id}')" style="background:var(--success); color:white; border:none; padding:10px; border-radius:8px; flex:1;">💾 儲存</button>
                    <button onclick="window.delD('products', '${p.id}')" style="background:red; color:white; border:none; padding:10px; border-radius:8px; flex:1;">🗑️ 刪除</button>
                </div>
            </div>
        `).join('');
    }

    function renderAdminList() {
        document.getElementById('admin-list-cards').innerHTML = admins.map((a, i) => `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:bold;">管理員密碼</span>
                <button onclick="window.delD('admins', '${a.id}')" style="background:#888; color:white; border:none; padding:5px; border-radius:4px;">移除權限</button>
            </div>
        `).join('');
    }
</script>
</body>
</html>
